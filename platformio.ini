; NestboxCam – ESP32-CAM nestkast camerasysteem
; Platform: PlatformIO met Arduino Core for ESP32

[env:esp32cam]
platform      = espressif32
board         = esp32cam
framework     = arduino

; Serieel monitor
monitor_speed = 115200

; Partitie schema: meer app-ruimte
board_build.partitions = huge_app.csv

; Benodigde libraries (esp32_https_server alleen bij USE_HTTPS)
lib_deps =
    fhessel/esp32_https_server

; Compiler flags (USE_HTTPS in config.h)
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; Upload instellingen (pas aan op jouw poort)
upload_port   = COM3
upload_speed  = 921600
